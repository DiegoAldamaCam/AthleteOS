# AthleteOS local runtime.
#
# Profiles mitigate service-count friction during local dev:
#   core          -> kafka, schema-registry, flink-jobmanager, flink-taskmanager, postgres
#   bootstrap     -> schema-bootstrap (one-shot: register schemas + create topics)
#   ingest        -> ingestion (file watcher/producers)
#   serve         -> fastapi (real API) + web SPA
#   observability -> prometheus (9090) + grafana (3000); scrapes fastapi + flink reporters
#
# Start everything needed for the MVP strength slice:
#   docker compose --profile core --profile bootstrap up -d
# Reset topic/schema state:
#   docker compose --profile bootstrap run --rm schema-bootstrap
# Start observability stack (requires core + serve running):
#   docker compose --profile observability up -d

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    profiles: ["core"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Single-broker cluster: all internal replication factors = 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # KRaft cluster id: a 128-bit UUID encoded as 22-char base64url (no
      # padding), as produced by `kafka-storage random-uuid`. It is NOT an
      # arbitrary string: Kafka base64-decodes it and requires exactly 16 bytes,
      # so a hand-written label fails preflight with "not a valid UUID".
      CLUSTER_ID: "Sdry9tBASdKvUsLwV--CJA"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    profiles: ["core"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:9092"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_GROUP_ID: schema-registry
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # Flink Web UI / REST.
  #
  # FIX (carried-forward TODO): the container's REST endpoint defaulted to
  # internal port 8081 while the publish mapping was 8082:8082 -> host port 8082
  # forwarded to a container port where nothing listened, making the Flink UI
  # unreachable from the host. Resolution chosen: set `rest.port: 8082` in
  # FLINK_PROPERTIES so the jobmanager actually listens on 8082 inside the
  # container, keeping the existing `8082:8082` publish correct and ALIGNED with
  # the healthcheck. This also avoids clashing with schema-registry's host port
  # 8081 (the alternative `8083:8081` mapping was rejected: it would leave the
  # compose's own port numbers inconsistent across services).
  flink-jobmanager:
    image: flink:1.19
    profiles: ["core"]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8082
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    ports:
      - "8082:8082"
      - "9249:9249"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/config || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # taskmanager healthcheck (gate-review suggestion): the TM exposes no REST of
  # its own, so the best lightweight signal is that it can reach the JM REST
  # endpoint over the internal network (proves the TM started and the Flink
  # control plane is wired). A stronger per-TM registration assertion lives in
  # the metrics/observability stack (post-MVP).
  flink-taskmanager:
    image: flink:1.19
    profiles: ["core"]
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: file:///flink-checkpoints
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9250
    ports:
      - "9250:9250"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://flink-jobmanager:8082/config || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  postgres:
    image: postgres:16
    profiles: ["core"]
    environment:
      POSTGRES_USER: athleteos
      POSTGRES_PASSWORD: athleteos
      POSTGRES_DB: athleteos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athleteos -d athleteos"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot bootstrap: registers canonical Avro schemas (BACKWARD) and creates
  # the Kafka topic topology (8 partitions, retention per event-contracts spec).
  schema-bootstrap:
    build:
      context: .
      dockerfile: bootstrap/Dockerfile
    profiles: ["bootstrap"]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    command: ["python", "-m", "bootstrap.run"]

  # Ingestion supervisor: runs all 6 connector watchers in daemon threads.
  # Cross-profile note: schema-bootstrap uses profile 'bootstrap'; ingestion uses
  # profile 'ingest'. Docker Compose does NOT auto-start cross-profile deps.
  # Operator must run `docker compose --profile bootstrap up -d` first.
  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    profiles: ["ingest"]
    depends_on:
      schema-bootstrap:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      INGEST_WATCH_DIR: "/data/inbox"
    volumes:
      - ./data:/data
    restart: on-failure

  fastapi:
    build:
      context: .
      dockerfile: api/Dockerfile
    profiles: ["serve"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://athleteos:athleteos@postgres:5432/athleteos"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      CORS_ORIGINS: "http://localhost:5173"
      # Placeholder for local dev only — replace with a real secret in production.
      API_KEY: "dev-replace-me"
    ports:
      - "8000:8000"
    healthcheck:
      # /health is now a readiness probe: DB SELECT 1 + Kafka list_topics (5s each).
      # start_period covers the sum of both probe timeouts plus app startup latency.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 20s

  # React SPA served via Nginx (WU-4).
  # Profile: serve (alongside fastapi). Start with:
  #   docker compose --profile serve up -d
  web:
    build:
      context: web
      dockerfile: Dockerfile
    profiles: ["serve"]
    depends_on:
      fastapi:
        condition: service_healthy
    ports:
      - "80:80"

  # ---------------------------------------------------------------------------
  # Observability stack (profile: observability)
  # Start with: docker compose --profile observability up -d
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  grafana:
    image: grafana/grafana:10.4.2
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "athleteos"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  grafana-data: