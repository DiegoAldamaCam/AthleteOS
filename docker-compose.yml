# AthleteOS local runtime (PR1 foundation scaffold).
#
# Profiles mitigate service-count friction during local dev:
#   core      -> kafka, schema-registry, flink-jobmanager, flink-taskmanager, postgres
#   bootstrap -> schema-bootstrap (one-shot: register schemas + create topics)
#   ingest    -> ingestion (file watcher/producers; PR2 fills this)
#   serve     -> fastapi, streamlit (PR6 fills these)
#
# Start everything needed for the MVP strength slice:
#   docker compose --profile core --profile bootstrap up -d
# Reset topic/schema state:
#   docker compose --profile bootstrap run --rm schema-bootstrap

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    profiles: ["core"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Single-broker cluster: all internal replication factors = 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Stable short cluster id (base64 uuid, 22 chars) for KRaft storage.
      CLUSTER_ID: "AthlOSFndtnKRaft1"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    profiles: ["core"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:9092"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_GROUP_ID: schema-registry
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  flink-jobmanager:
    image: flink:1.19
    profiles: ["core"]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/config || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  flink-taskmanager:
    image: flink:1.19
    profiles: ["core"]
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: file:///flink-checkpoints

  postgres:
    image: postgres:16
    profiles: ["core"]
    environment:
      POSTGRES_USER: athleteos
      POSTGRES_PASSWORD: athleteos
      POSTGRES_DB: athleteos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athleteos -d athleteos"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot bootstrap: registers canonical Avro schemas (BACKWARD) and creates
  # the Kafka topic topology (8 partitions, retention per event-contracts spec).
  schema-bootstrap:
    build:
      context: .
      dockerfile: bootstrap/Dockerfile
    profiles: ["bootstrap"]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    command: ["python", "-m", "bootstrap.run"]

  # Placeholder ingestion watcher. PR2 will provide the real Strong CSV parser
  # + producer (replacing this stub with a build context + entrypoint).
  ingestion:
    image: python:3.12-slim
    profiles: ["ingest"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      INGEST_WATCH_DIR: "/data/inbox"
    volumes:
      - ./data:/data
    command: ["sleep", "infinity"]

  # Placeholder FastAPI service. PR6 fills the real Dockerfile + app.
  fastapi:
    image: python:3.12-slim
    profiles: ["serve"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://athleteos:athleteos@postgres:5432/athleteos"
    ports:
      - "8000:8000"
    command: ["sleep", "infinity"]

  # Placeholder Streamlit service. PR6 fills the real Dockerfile + dashboard.
  streamlit:
    image: python:3.12-slim
    profiles: ["serve"]
    environment:
      DATABASE_URL: "postgresql://athleteos:athleteos@postgres:5432/athleteos"
    ports:
      - "8501:8501"
    command: ["sleep", "infinity"]

volumes:
  postgres-data: