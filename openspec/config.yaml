schema: spec-driven

context: |
  Project: AthleteOS — real-time athlete data platform (portfolio-grade)
  Stack: Python 3.11, PyFlink 1.19, Kafka (confluent-kafka), Schema Registry (fastavro),
    pyiceberg 0.7.x, PostgreSQL (psycopg2), DuckDB, FastAPI + uvicorn, Docker Compose,
    React 18 + Vite 5 + TypeScript (pnpm), TanStack Query, Recharts, React Router v6,
    Nginx (static serve, multi-stage Docker)
  Phases 1-6: MERGED to master (ingestion, canonical model, stream processing,
    serving store [PG UPSERT], analytical store [Iceberg + DuckDB read path + parity])
  Phase 7: COMPLETE (master @ 292a9c4) — Streamlit stub replaced by React SPA in web/;
    FastAPI extended with GET /athletes/{id}/metrics (time-series) and
    GET /pipeline/dlq-depth (graceful-degrade); CI has 3 parallel jobs (unit/integration/frontend).
  Architecture: event-time-first, layered (raw → canonical → stream → serving → analytical → API/UI)
  Last refreshed: 2026-06-27 (athleteos-phase7-web archived)

strict_tdd: true

testing:
  # Python backend (authoritative — active today)
  runner: pytest
  runner_status: present
  command: "python -m pytest"
  unit_command: "python -m pytest tests/unit/ -v"
  integration_command: "python -m pytest tests/integration/ -v"
  coverage_command: "python -m pytest --cov"  # requires pytest-cov (not in dev deps yet)
  layers:
    unit: true       # tests/unit/ — 11 files, no Docker
    integration: true  # tests/integration/ — 6 files, testcontainers (Redpanda + PostgreSQL)
    e2e: false
  markers:
    integration: "tests requiring a running Docker daemon via testcontainers"
  config_file: pytest.ini
  note: "strict_tdd: true — pytest runner and test files confirmed present. RED→GREEN→REFACTOR required in all apply phases."

  # Frontend (Phase 7 — COMPLETE, tooling live on master @ 292a9c4)
  frontend:
    status: active
    runner: vitest
    runner_status: present
    command: "pnpm test"
    lint_command: "pnpm lint"
    typecheck_command: "pnpm exec tsc --noEmit"
    build_command: "pnpm build"
    working_directory: web/
    package_manager: pnpm
    environment: happy-dom
    test_files: "web/src/components/__tests__/DashboardPage.test.tsx, web/src/utils/densifySeries.test.ts, web/src/App.test.tsx"
    ci_job: frontend
    note: "Frontend tooling fully scaffolded by Phase 7. 13 tests passing (6 dashboard behavior + 6 densifySeries + 1 smoke). pnpm 9.15.9, vitest ^2.0.3, RTL ^16, happy-dom."

rules:
  proposal:
    - Include rollback plan for risky changes
    - Justify every technology choice with trade-offs
    - For Phase 7: justify framework/routing/state-management choices (React is decided; router and state manager are open forks)
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Event contracts are the source of truth — no job or API may contradict them without an explicit ADR
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale (ADR format)
    - Event-time semantics must be explicit (watermark strategy, late data handling)
    - For Phase 7: include component hierarchy diagram and API contract surface
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - For Phase 7: separate backend API tasks from frontend scaffold + feature tasks
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "python -m pytest"
    frontend_test_command: "vitest run"  # valid only after Phase 7 scaffolding
  verify:
    test_command: "python -m pytest"
    build_command: "docker compose build"
    coverage_threshold: 0
    frontend_verify: "vitest run && tsc --noEmit && eslint src/"  # valid only after Phase 7 scaffolding
  archive:
    - Warn before merging destructive deltas
    - Update openspec/config.yaml testing.frontend block once Phase 7 tooling is live
    # Phase 7 archive rule fulfilled: testing.frontend updated 2026-06-27
