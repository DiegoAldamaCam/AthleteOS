global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets:
          - fastapi:8000

  - job_name: flink-jobmanager
    static_configs:
      - targets:
          - flink-jobmanager:9249

  - job_name: flink-taskmanager
    static_configs:
      - targets:
          - flink-taskmanager:9250
